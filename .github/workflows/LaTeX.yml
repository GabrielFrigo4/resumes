name: Compilar LaTeX e Gerar PDF

on:
    push:
        branches:
            - main
            - master

jobs:
    build_latex:
        name: Build LaTeX & Release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Fazer Checkout do código
              uses: actions/checkout@v4

            - name: Executar Linting (Avisos de Formatação)
              run: |
                  sudo apt-get update && sudo apt-get install -y chktex
                  shopt -s globstar nullglob
                  for file in **/*.tex; do
                    echo "==== Linting: $file ===="
                    # Executa chktex no arquivo atual. "|| true" impede que avisos de linter quebrem a pipeline
                    chktex -v0 "$file" || true
                  done

            - name: Compilar todos os arquivos LaTeX
              uses: xu-cheng/latex-action@v3
              with:
                  root_file: "**/*.tex"

            - name: Deletar Release e Tag 'latest' antigas
              uses: dev-drprasad/delete-tag-and-release@v1.1
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              with:
                  delete_release: true
                  tag_name: latest
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Organizar PDFs e Gerar Árvore de Descrição
              id: prep_files
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              run: |
                  mkdir -p dist
                  RELEASE_NOTE="release_note.md"

                  export TZ="America/Sao_Paulo"
                  printf -v FORMATTED_DATE '%(%d/%m/%Y %H:%M)T' -1

                  cat <<EOF > "${RELEASE_NOTE}"
                  ### 📄 Documentos Gerados
                  Esta release contém as versões mais recentes dos documentos compilados automaticamente.

                  **Commit:** \`${{ github.sha }}\`
                  **Data:** ${FORMATTED_DATE}

                  ---

                  EOF

                  shopt -s globstar nullglob
                  declare -A DIRS_MAP

                  for TEX_FILE in **/*.tex; do
                      DIR_NAME="${TEX_FILE%/*}"
                      if [[ "${DIR_NAME}" == "${TEX_FILE}" ]]; then
                          DIR_NAME="Raiz"
                      fi
                      
                      BASE_NAME="${TEX_FILE##*/}"
                      PDF_NAME="${BASE_NAME%.tex}.pdf"
                      
                      if [[ -f "${PDF_NAME}" ]]; then
                          cp "${PDF_NAME}" "dist/${PDF_NAME}"
                          DIRS_MAP["${DIR_NAME}"]+="${PDF_NAME}|"
                      elif [[ -f "${DIR_NAME}/${PDF_NAME}" ]]; then
                          cp "${DIR_NAME}/${PDF_NAME}" "dist/${PDF_NAME}"
                          DIRS_MAP["${DIR_NAME}"]+="${PDF_NAME}|"
                      fi
                  done

                  mapfile -t SORTED_DIRS < <(printf '%s\n' "${!DIRS_MAP[@]}" | sort)

                  for DIR in "${SORTED_DIRS[@]}"; do
                      if [[ "${DIR}" == "Raiz" ]]; then
                          echo "## 📂 Raiz" >> "${RELEASE_NOTE}"
                      else
                          TITLE="${DIR^}"
                          echo "## 📂 ${TITLE}" >> "${RELEASE_NOTE}"
                      fi

                      IFS='|' read -r -a PDF_LIST <<< "${DIRS_MAP[$DIR]}"
                      mapfile -t SORTED_PDFS < <(printf '%s\n' "${PDF_LIST[@]}" | sort)

                      for PDF_FILE in "${SORTED_PDFS[@]}"; do
                          [[ -z "${PDF_FILE}" ]] && continue
                          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/latest/${PDF_FILE}"
                          echo "- 📄 [${PDF_FILE}](${DOWNLOAD_URL})" >> "${RELEASE_NOTE}"
                      done
                      echo "" >> "${RELEASE_NOTE}"
                  done

                  DIST_FILES=( dist/*.pdf )
                  if [[ ${#DIST_FILES[@]} -eq 0 ]]; then
                    echo "Erro: Nenhum PDF foi gerado."
                    exit 1
                  fi

            - name: Criar Nova Release 'latest'
              uses: softprops/action-gh-release@v2
              if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
              with:
                  tag_name: latest
                  name: "Documentos Atualizados"
                  body_path: release_note.md
                  target_commitish: ${{ github.sha }}
                  files: "dist/*.pdf"
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
